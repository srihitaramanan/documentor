spring:
  application:
    name: documentor

  # Virtual threads — fits ADR-004
  threads:
    virtual:
      enabled: true

  # Database
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/documentor}
    username: ${DB_USER:documentor}
    password: ${DB_PASSWORD:documentor}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate   # schema owned by Flyway, NOT Hibernate
    properties:
      hibernate:
        jdbc.lob.non_contextual_creation: true
        format_sql: true
    open-in-view: false    # avoid lazy-loading surprises in controllers

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Spring AI — Ollama (local, free)
  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2}
          temperature: 0.3
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

# Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

# OpenAPI / Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# DocuMentor-specific config (used as we build features)
documentor:
  ingestion:
    chunk-size-tokens: 500
    chunk-overlap-tokens: 50
    batch-size: 32
  storage:
    backend: ${STORAGE_BACKEND:local}
    local-path: ${STORAGE_LOCAL_PATH:./data/blobs}
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-replace-in-prod-must-be-32-chars-or-more}
    expiry-hours: ${JWT_EXPIRY_HOURS:24}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.srihitaramanan.documentor: DEBUG
    org.springframework.ai: INFO
    org.hibernate.SQL: INFO