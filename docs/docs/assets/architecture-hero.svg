<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">DocuMentor — System Architecture</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#64748b">Java 21 · Spring Boot 3 · PostgreSQL + pgvector · Spring AI</text>

  <!-- Client column -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="180" height="360" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <text x="150" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">CLIENTS</text>

  <g transform="translate(80,170)">
    <rect width="140" height="60" rx="8" fill="url(#clientGrad)"/>
    <text x="70" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="white">🖥️  Swagger UI</text>
    <text x="70" y="48" text-anchor="middle" font-size="10" fill="#dbeafe">/swagger-ui.html</text>
  </g>
  <g transform="translate(80,250)">
    <rect width="140" height="60" rx="8" fill="url(#clientGrad)"/>
    <text x="70" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="white">⌨️  curl / Postman</text>
    <text x="70" y="48" text-anchor="middle" font-size="10" fill="#dbeafe">REST + JWT</text>
  </g>
  <g transform="translate(80,330)">
    <rect width="140" height="60" rx="8" fill="url(#clientGrad)"/>
    <text x="70" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="white">🌐  Web App</text>
    <text x="70" y="48" text-anchor="middle" font-size="10" fill="#dbeafe">SSE streaming</text>
  </g>
  <g transform="translate(80,410)">
    <rect width="140" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">JWT Bearer</text>
    <text x="70" y="38" text-anchor="middle" font-size="10" fill="#4338ca">Authorization header</text>
  </g>

  <!-- API column -->
  <g filter="url(#shadow)">
    <rect x="320" y="120" width="380" height="360" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
  </g>
  <text x="510" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">SPRING BOOT API (modular monolith)</text>

  <!-- Filters layer -->
  <g transform="translate(340,170)">
    <rect width="340" height="46" rx="8" fill="#d1fae5" stroke="#10b981"/>
    <text x="170" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">FILTERS</text>
    <text x="170" y="36" text-anchor="middle" font-size="11" fill="#047857">JwtAuthFilter → RateLimitFilter → MDC</text>
  </g>

  <!-- Controllers -->
  <g transform="translate(340,230)">
    <rect width="340" height="50" rx="8" fill="url(#apiGrad)"/>
    <text x="170" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="white">CONTROLLERS</text>
    <text x="170" y="38" text-anchor="middle" font-size="10" fill="#ecfdf5">Auth · Document · Conversation · Chat (SSE)</text>
  </g>

  <!-- Services -->
  <g transform="translate(340,294)">
    <rect width="340" height="68" rx="8" fill="url(#apiGrad)"/>
    <text x="170" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="white">SERVICES</text>
    <text x="170" y="38" text-anchor="middle" font-size="10" fill="#ecfdf5">AuthService · DocumentService · IngestionService</text>
    <text x="170" y="54" text-anchor="middle" font-size="10" fill="#ecfdf5">ChatService · VectorSearchService · EmbeddingService</text>
  </g>

  <!-- Domain helpers -->
  <g transform="translate(340,376)">
    <rect width="165" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="82" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#78350f">DOMAIN</text>
    <text x="82" y="36" text-anchor="middle" font-size="10" fill="#92400e">PromptBuilder · Chunker</text>
  </g>
  <g transform="translate(515,376)">
    <rect width="165" height="48" rx="8" fill="#fce7f3" stroke="#ec4899"/>
    <text x="82" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#831843">ASYNC</text>
    <text x="82" y="36" text-anchor="middle" font-size="10" fill="#9d174d">Virtual Thread Executor</text>
  </g>

  <!-- Observability bar -->
  <g transform="translate(340,438)">
    <rect width="340" height="28" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="170" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#075985">📊 Actuator · Micrometer · Prometheus metrics</text>
  </g>

  <!-- Storage column -->
  <g filter="url(#shadow)">
    <rect x="780" y="120" width="180" height="170" rx="12" fill="white" stroke="#7c3aed" stroke-width="2"/>
  </g>
  <text x="870" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">STORAGE</text>
  <g transform="translate(800,170)">
    <rect width="140" height="100" rx="8" fill="url(#dbGrad)"/>
    <text x="70" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="white">🐘 PostgreSQL 16</text>
    <text x="70" y="48" text-anchor="middle" font-size="11" fill="#ede9fe">+ pgvector (HNSW)</text>
    <line x1="20" y1="58" x2="120" y2="58" stroke="#ede9fe" stroke-width="0.5"/>
    <text x="70" y="74" text-anchor="middle" font-size="9" fill="#ede9fe">users · documents</text>
    <text x="70" y="86" text-anchor="middle" font-size="9" fill="#ede9fe">chunks · conversations</text>
  </g>

  <!-- LLM providers column -->
  <g filter="url(#shadow)">
    <rect x="780" y="310" width="180" height="170" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="870" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">LLM PROVIDERS</text>
  <text x="870" y="354" text-anchor="middle" font-size="10" fill="#a16207">via Spring AI abstraction</text>
  <g transform="translate(800,365)">
    <rect width="140" height="32" rx="6" fill="url(#llmGrad)"/>
    <text x="70" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="white">OpenAI</text>
  </g>
  <g transform="translate(800,403)">
    <rect width="140" height="32" rx="6" fill="url(#llmGrad)"/>
    <text x="70" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="white">Anthropic Claude</text>
  </g>
  <g transform="translate(800,441)">
    <rect width="140" height="32" rx="6" fill="url(#llmGrad)"/>
    <text x="70" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="white">Ollama (local)</text>
  </g>

  <!-- Observability column far right -->
  <g filter="url(#shadow)">
    <rect x="1000" y="120" width="150" height="170" rx="12" fill="white" stroke="#0284c7" stroke-width="2"/>
  </g>
  <text x="1075" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#075985">OBSERVABILITY</text>
  <g transform="translate(1015,170)">
    <rect width="120" height="50" rx="6" fill="#bae6fd"/>
    <text x="60" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">Prometheus</text>
    <text x="60" y="38" text-anchor="middle" font-size="9" fill="#075985">metrics scrape</text>
  </g>
  <g transform="translate(1015,228)">
    <rect width="120" height="50" rx="6" fill="#fed7aa"/>
    <text x="60" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#7c2d12">Grafana</text>
    <text x="60" y="38" text-anchor="middle" font-size="9" fill="#9a3412">dashboards</text>
  </g>

  <!-- Pipeline label -->
  <g filter="url(#shadow)">
    <rect x="1000" y="310" width="150" height="170" rx="12" fill="white" stroke="#64748b" stroke-width="2"/>
  </g>
  <text x="1075" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">RAG PIPELINE</text>
  <text x="1075" y="362" text-anchor="middle" font-size="10" fill="#475569">① Embed question</text>
  <text x="1075" y="380" text-anchor="middle" font-size="10" fill="#475569">② Cosine search top-K</text>
  <text x="1075" y="398" text-anchor="middle" font-size="10" fill="#475569">③ Build prompt</text>
  <text x="1075" y="416" text-anchor="middle" font-size="10" fill="#475569">④ Stream tokens</text>
  <text x="1075" y="434" text-anchor="middle" font-size="10" fill="#475569">⑤ Extract citations</text>
  <text x="1075" y="452" text-anchor="middle" font-size="10" fill="#475569">⑥ Persist message</text>

  <!-- Arrows -->
  <!-- Client → API -->
  <line x1="240" y1="200" x2="318" y2="195" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="280" x2="318" y2="255" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="360" x2="318" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API → DB -->
  <path d="M 700 280 Q 740 230 778 220" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="730" y="240" font-size="10" font-style="italic" fill="#065f46">JPA + native pgvector queries</text>

  <!-- API → LLM -->
  <path d="M 700 400 Q 740 410 778 410" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="710" y="430" font-size="10" font-style="italic" fill="#065f46">streaming chat + embeddings</text>

  <!-- API → Prometheus -->
  <path d="M 700 452 Q 850 480 1000 240" stroke="#0284c7" stroke-width="2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Footer note -->
  <text x="600" y="555" text-anchor="middle" font-size="11" fill="#64748b">
    Async ingestion runs on Java 21 virtual threads · JWT-secured · multi-provider LLM via Spring AI
  </text>
  <text x="600" y="572" text-anchor="middle" font-size="10" fill="#94a3b8">
    See docs/architecture.md for component-level detail and docs/adr/ for design decisions
  </text>
</svg>
